<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0,
               maximum-scale=1.0, user-scalable=no">

<title>Life Scense</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<!-- Cairo Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
:root {
    --primary: #2563eb;
    --secondary: #06b6d4;
    --success: #10b981;
    --danger: #ef4444;
    --text: #0f172a;
    --muted: #64748b;
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
    --radius: 28px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Cairo', sans-serif;
    touch-action: manipulation;
}

body {
    background: linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 12px;
    color: var(--text);
}

.app {
    width: 100%;
    max-width: 430px;
    height: 100%;
    background: var(--card);
    border-radius: 36px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,0.9);
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;     
    -ms-overflow-style: none;  
}
.app::-webkit-scrollbar {
    display: none;              
}
.header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
}

.logo {
    width: 58px;
    height: 58px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 24px;
    box-shadow: 0 12px 24px rgba(37, 99, 235, 0.25);
}

.title h1 {
    font-size: 24px;
    font-weight: 800;
}

.title p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
}

.status {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    border-radius: 18px;
    background: #f8fafc;
    border: 1px solid var(--border);
    margin-bottom: 18px;
}

.status-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.status-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #f59e0b;
    animation: blink 1.5s infinite;
}

.status.connected .status-dot {
    background: var(--success);
}

.status-text {
    font-size: 14px;
    font-weight: 700;
}

.main-card {
    flex: 1;
    background: linear-gradient(180deg, #ffffff, #f8fbff);
    border: 1px solid var(--border);
    border-radius: 32px;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
}

.voice-circle {
    width: 96px;
    height: 96px;
    border-radius: 30px;
    background: linear-gradient(135deg, var(--secondary), var(--primary));
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 38px;
    box-shadow: 0 18px 35px rgba(37, 99, 235, 0.25);
    margin-bottom: 20px;
}

.voice-circle.speaking {
    animation: pulse 1s infinite;
}

.label {
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 14px;
}

#gestureText {
    font-size: 42px;
    font-weight: 800;
    text-align: center;
    line-height: 1.5;
    min-height: 120px;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0 10px;
    word-break: break-word;
}

#gestureText.animate {
    animation: popIn 0.6s ease;
}

.actions {
    display: flex;
    gap: 12px;
    width: 100%;
    margin-top: 16px;
}

.btn {
    flex: 1;
    border: none;
    border-radius: 18px;
    padding: 14px;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
}

.btn-secondary {
    background: #f8fafc;
    color: var(--text);
    border: 1px solid var(--border);
}

.history {
    margin-top: 18px;
}

.history-title {
    font-size: 14px;
    font-weight: 800;
    margin-bottom: 10px;
}

.history-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.history-item {
    padding: 8px 12px;
    border-radius: 14px;
    background: #eff6ff;
    color: var(--primary);
    font-size: 12px;
    font-weight: 700;
}

.footer {
    text-align: center;
    margin-top: 14px;
    font-size: 12px;
    color: var(--muted);
}

@keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 18px 35px rgba(37,99,235,0.25); }
    50% { transform: scale(1.05); box-shadow: 0 22px 45px rgba(37,99,235,0.35); }
    100% { transform: scale(1); box-shadow: 0 18px 35px rgba(37,99,235,0.25); }
}

@keyframes popIn {
    0% { opacity: 0; transform: scale(0.9); }
    100% { opacity: 1; transform: scale(1); }
}

@keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
}
</style>
</head>
<body>

<div class="app">

    <!-- Header -->
    <div class="header">
        <div class="logo">
            <i class="fa-solid fa-hand"></i>
        </div>
        <div class="title">
            <h1>Life Scense</h1>
            <p>ترجمة لغة الإشارة إلى صوت ونص</p>
        </div>
    </div>

    <!-- Connection Status -->
    <div class="status" id="statusBox">
        <div class="status-left">
            <div class="status-dot"></div>
            <div class="status-text" id="statusText">جارٍ الاتصال...</div>
        </div>
        <i class="fa-solid fa-wifi"></i>
    </div>

    <!-- Main Card -->
    <div class="main-card">

        <!-- Voice Icon -->
        <div class="voice-circle" id="voiceCircle">
            <i class="fa-solid fa-volume-high"></i>
        </div>

        <!-- Label -->
        <div class="label">النص المكتشف</div>

        <!-- Main Text -->
        <div id="gestureText">في انتظار الإشارة...</div>

        <!-- Action Buttons -->
        <div class="actions">
            <button class="btn btn-primary" onclick="speak(lastWord)">
                <i class="fa-solid fa-play"></i>
                إعادة النطق
            </button>

            <button class="btn btn-secondary" onclick="clearHistory()">
                <i class="fa-solid fa-trash"></i>
                مسح السجل
            </button>
        </div>

        <!-- History -->
        <div class="history">
            <div class="history-title">آخر الكلمات</div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer" id="lastUpdate">
        لم يتم استقبال أي بيانات بعد
    </div>

</div>

<script>
// ================= Firebase Configuration =================
const firebaseConfig = {
    apiKey: "AIzaSyApVQFB4Eofn-W060CJSQoV4H5HkXNj7QQ",
    authDomain: "glovelife-3a3d3.firebaseapp.com",
    databaseURL: "https://glovelife-3a3d3-default-rtdb.firebaseio.com",
    projectId: "glovelife-3a3d3",
    storageBucket: "glovelife-3a3d3.firebasestorage.app",
    messagingSenderId: "411245424372",
    appId: "1:411245424372:web:865113a29b06417caa78a1",
    measurementId: "G-38CH5487N2"
};

// ================= Initialize Firebase =================
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================= UI Elements =================
const gestureText = document.getElementById('gestureText');
const statusBox = document.getElementById('statusBox');
const statusText = document.getElementById('statusText');
const lastUpdate = document.getElementById('lastUpdate');
const historyList = document.getElementById('historyList');
const voiceCircle = document.getElementById('voiceCircle');

// ================= Global Variables =================
let lastWord = "";
let history = [];
let isSpeaking = false;

// ================= Text To Speech =================
function speak(text) {
    if (!text || isSpeaking) return;

    // إيقاف أي نطق سابق
    window.speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    utterance.rate = 0.9;
    utterance.pitch = 1.0;
    utterance.volume = 1.0;

    // اختيار أفضل صوت متاح
    const voices = window.speechSynthesis.getVoices();
    const preferredVoice =
        voices.find(v => v.lang.includes('en') && v.name.includes('Google')) ||
        voices.find(v => v.lang.includes('en'));

    if (preferredVoice) {
        utterance.voice = preferredVoice;
    }

    utterance.onstart = () => {
        isSpeaking = true;
        voiceCircle.classList.add('speaking');
    };

    utterance.onend = () => {
        isSpeaking = false;
        voiceCircle.classList.remove('speaking');
    };

    utterance.onerror = () => {
        isSpeaking = false;
        voiceCircle.classList.remove('speaking');
    };

    window.speechSynthesis.speak(utterance);
}

// ================= Update Main Text =================
function updateGesture(text) {
    gestureText.textContent = text;

    // إعادة تشغيل الأنيميشن
    gestureText.classList.remove('animate');
    void gestureText.offsetWidth;
    gestureText.classList.add('animate');

    // تحديث الوقت
    const now = new Date();
    lastUpdate.textContent =
        'آخر تحديث: ' + now.toLocaleTimeString('ar-EG');

    // اهتزاز الهاتف إذا كان مدعومًا
    if (navigator.vibrate) {
        navigator.vibrate(150);
    }

    // تحديث السجل
    addToHistory(text);

    // نطق النص
    speak(text);
}

// ================= History =================
function addToHistory(text) {
    // منع التكرار المتتالي
    if (history.length > 0 && history[0] === text) return;

    history.unshift(text);

    // الاحتفاظ بآخر 5 كلمات فقط
    if (history.length > 5) {
        history.pop();
    }

    renderHistory();
}

function renderHistory() {
    historyList.innerHTML = '';

    history.forEach(item => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.textContent = item;
        historyList.appendChild(div);
    });
}

function clearHistory() {
    history = [];
    renderHistory();
}

// ================= Firebase Connection Status =================
firebase.database().ref(".info/connected").on("value", (snap) => {
    if (snap.val() === true) {
        statusBox.classList.add("connected");
        statusText.textContent = "متصل بقاعدة البيانات";
    } else {
        statusBox.classList.remove("connected");
        statusText.textContent = "غير متصل";
    }
});

// ================= Listen to Firebase =================
db.ref("Glove/Sign").on("value", (snapshot) => {
    const value = snapshot.val();

    if (value &&
        typeof value === "string" &&
        value.trim() !== "" &&
        value !== lastWord) {

        lastWord = value;
        updateGesture(value);
    }
});

// ================= Preload Voices =================
window.speechSynthesis.onvoiceschanged = () => {
    window.speechSynthesis.getVoices();
};

// ================= Prevent Zoom =================
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('dblclick', e => e.preventDefault());

// ================= Prevent Pull-to-Refresh =================
document.addEventListener('touchmove', function(e) {
    if (document.body.scrollHeight <= window.innerHeight) {
        e.preventDefault();
    }
}, { passive: false });

</script>

</body>
</html>
